
# mode: train
mode: train test test_channel visual visual_proto
# mode: test
# mode: visual
# mode: visual_proto
# mode: test test_channel
# mode: test visual visual_proto
# mode: test_channel visual visual_proto 
batch_size: 128
learning_rate: 0.001
epochs: 2
beta: 0.25
window_size: 100

time_recon:
  patch_size: 10
  in_dim: 72
  n_hiddens: 8
  n_residual_hiddens: 8
  n_residual_layers: 1
  embedding_dim: 8
  n_embeddings: 8
  activation: gelu

freq_recon:
  patch_size: 10
  in_dim: 72
  n_hiddens: 8
  n_residual_hiddens: 8
  n_residual_layers: 1
  embedding_dim: 8
  n_embeddings: 8
  activation: gelu

aggregate: mean
topk: 2
alpha: 1
beta: 1

log_interval: 50
dataset: CICIDS.csv

# Boolean flags in YAML use true/false
save: true
filename: cicids  # will default to timestamp if empty
visual_channel: [0,1,2]

