batch_size: 128
learning_rate: 0.001
epochs: 10
beta: 0.25
window_size: 100

time_recon:
  patch_size: 10
  in_dim: 25
  n_hiddens: 32
  n_residual_hiddens: 32
  n_residual_layers: 2
  embedding_dim: 32
  n_embeddings: 32
  activation: gelu
  top_k: 3



freq_recon:
  patch_size: 10
  in_dim: 25
  n_hiddens: 32
  n_residual_hiddens: 32
  n_residual_layers: 2
  embedding_dim: 32
  n_embeddings: 32
  activation: gelu
  top_k: 3
  
aggregate: mean
topk: 2
alpha: 1
beta: 1

log_interval: 200
dataset: PSM.csv

# Boolean flags in YAML use true/false
save: true
filename: psm  # will default to timestamp if empty
visual_channel: [4]

