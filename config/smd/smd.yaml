

# mode: train
# mode: train test test_channel visual visual_proto
# mode: test
# mode: visual
# mode: visual_proto
mode: test test_channel
# mode: test visual visual_proto
# mode: test_channel visual visual_proto 
batch_size: 128
learning_rate: 0.001
epochs: 1
beta: 0.25
window_size: 100

time_recon:
  patch_size: 10
  in_dim: 38
  n_hiddens: 64
  n_residual_hiddens: 64
  n_residual_layers: 2
  embedding_dim: 64
  n_embeddings: 8
  activation: gelu
  downsample_factor: 10


freq_recon:
  patch_size: 17
  in_dim: 38
  n_hiddens: 32
  n_residual_hiddens: 32
  n_residual_layers: 2
  embedding_dim: 32
  n_embeddings: 8
  activation: gelu
  downsample_factor: 17

topk: 3
alpha: 1
beta: 1

log_interval: 50
dataset: SMD.csv

# Boolean flags in YAML use true/false
save: true
filename: smd  # will default to timestamp if empty
visual_channel: [0,1,2,3]
